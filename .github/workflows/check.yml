name: check

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        working-directory: backend
        run: uv sync --frozen

      - name: Lint (ruff)
        working-directory: backend
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: uv run mypy app/

      - name: Tests with coverage threshold
        working-directory: backend
        # Ubuntu runners ship a running Docker daemon, so testcontainers can
        # spin up the postgres:17-alpine fixture container.
        run: uv run pytest tests/ --cov=app --cov-report=term
